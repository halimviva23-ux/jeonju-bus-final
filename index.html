<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 버스 도착 정보</title>
    <style>
        :root { --primary: #0056b3; --danger: #e63946; --bg: #f8f9fa; --card-bg: #ffffff; --text: #333333; }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 1.6em; word-break: keep-all; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .bus-card { background: var(--card-bg); padding: 20px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); cursor: pointer; border-left: 6px solid var(--primary); transition: transform 0.2s; }
        .bus-card:active { transform: scale(0.98); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bus-no { font-size: 1.5em; font-weight: 800; color: var(--primary); }
        .badge { background: var(--danger); color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9em; animation: pulse 2s infinite; }
        .desc { font-size: 0.95em; color: #666; }
        .route-info { display: none; margin-top: 15px; padding: 18px; background: #fdfdfd; border-radius: 12px; font-size: 0.9em; color: #555; line-height: 2.5; word-break: keep-all; border: 1px solid #eee; }
        .route-info.active { display: block; animation: fadeIn 0.3s ease; }
        /* 현재 정류장 강조 스타일 */
        .current-stop { background: var(--primary); color: white; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 1.15em; display: inline-block; box-shadow: 0 2px 5px rgba(0,86,179,0.3); margin: 0 4px; }
        .status { text-align: center; color: #888; margin-top: 50px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(230, 57, 70, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="station-name">정보 불러오는 중...</h2>
        <p style="margin: 10px 0 0; font-weight: 500;">실시간 버스 도착 정보</p>
    </div>
    <div class="container" id="bus-list">
        <div class="status">버스를 찾는 중입니다... 🚌</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cityCode = urlParams.get('cityCode') || '35010';
        const nodeId = urlParams.get('nodeId') || 'JUB306100792';
        const API_KEY = '598c44e30084ea8fa0ca3a2889d5c925ee6ba061080cbed38baf2e8150056039';

        let timerId = null;

        async function fetchBusInfo() {
            const listDiv = document.getElementById('bus-list');
            const stationNameEl = document.getElementById('station-name');
            const url = `https://apis.data.go.kr/1613000/ArvlInfoInqireService/getSttnAcctoArvlPrearngeInfoList?serviceKey=${encodeURIComponent(API_KEY)}&cityCode=${cityCode}&nodeId=${nodeId}&_type=json&numOfRows=15`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const rawItems = data.response?.body?.items?.item || data.response?.body?.items || [];
                const items = Array.isArray(rawItems) ? rawItems : (rawItems ? [rawItems] : []);

                if (items.length === 0 || !items[0]) {
                    listDiv.innerHTML = '<div class="status">현재 도착 예정인 버스가 없습니다.</div>';
                } else {
                    stationNameEl.innerText = items[0].nodenm + ' 정류장';
                    items.sort((a, b) => (a.arrtime || 0) - (b.arrtime || 0));
                    
                    listDiv.innerHTML = items.map((bus, index) => {
                        const min = Math.floor((bus.arrtime || 0) / 60);
                        const timeText = min < 3 ? '곧 도착' : min + '분 후';
                        const remainStations = (bus.arrprevstationcnt || 1) > 0 ? (bus.arrprevstationcnt || 1) - 1 : 0;

                        return `
                            <div class="bus-card" onclick="toggleRoute('${bus.routeid}', 'route-${index}')">
                                <div class="card-top">
                                    <div class="bus-no">🚌 ${bus.routeno}번</div>
                                    <div class="badge">${timeText}</div>
                                </div>
                                <div class="desc">📍 ${remainStations}정거장 남음</div>
                                <div id="route-${index}" class="route-info">노선을 보려면 터치하세요.</div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) { console.log("갱신 대기 중..."); }
            finally { 
                if (timerId) clearTimeout(timerId);
                timerId = setTimeout(fetchBusInfo, 60000); 
            }
        }

        async function toggleRoute(routeId, elementId) {
            const routeDiv = document.getElementById(elementId);
            if (routeDiv.classList.contains('active')) {
                routeDiv.classList.remove('active');
                return;
            }
            routeDiv.classList.add('active');
            
            if (routeDiv.innerHTML !== "노선을 보려면 터치하세요.") return;
            routeDiv.innerHTML = "노선도 불러오는 중...";

            const routeUrl = `https://apis.data.go.kr/1613000/BusRouteInfoInqireService/getRouteAcctoThrghSttnList?serviceKey=${encodeURIComponent(API_KEY)}&cityCode=${cityCode}&routeId=${routeId}&_type=json&numOfRows=150`;

            try {
                const response = await fetch(routeUrl);
                const data = await response.json();
                const rawSt = data.response?.body?.items?.item || data.response?.body?.items || [];
                const routeArray = Array.isArray(rawSt) ? rawSt : (rawSt ? [rawSt] : []);

                if (routeArray.length === 0 || !routeArray[0]) {
                    routeDiv.innerHTML = "노선 정보를 가져올 수 없습니다.";
                    return;
                }

                routeDiv.innerHTML = routeArray.map(st => {
                    // 현재 정류장인 경우 이름을 강조된 박스에 넣어 출력
                    if (st.nodeid === nodeId) {
                        return `<span class="current-stop">${st.nodenm}</span>`;
                    }
                    return st.nodenm;
                }).join(' → ');
            } catch (e) { 
                routeDiv.innerHTML = "데이터 지연으로 노선도를 불러오지 못했습니다."; 
            }
        }

        fetchBusInfo();
    </script>
</body>
</html>
